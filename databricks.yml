# This is a Declarative Automation Bundle definition for Databricks.
# The Databricks extension requires databricks.yml configuration file.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.

bundle:
  name: agent-skills-on-databricks

# Keep the skill OUT of the bundle upload - it is consumed from a shared UC volume (see the
# job's --skill-dir and scripts/publish_skill.py). That is the whole point of decoupling:
# publish the skill once, reuse it from any job, update it without redeploying consumers.
sync:
  exclude:
    - "skills/"

# ---------------------------------------------------------------------------
# Variables are the knobs you flip over time. The LLM endpoint is a variable
# ON PURPOSE: the day you enable billing, change this ONE default to
# databricks-claude-opus-4-8 and redeploy. Nothing else changes.
# ---------------------------------------------------------------------------
variables:
  llm_endpoint:
    description: Databricks-hosted serving endpoint used for text generation.
    default: databricks-gpt-oss-120b   # free-tier callable today; Claude is rate-limited to 0 on free tier
  catalog:
    description: Unity Catalog catalog holding the input/output volumes.
    default: workspace
  schema:
    description: Unity Catalog schema holding the input/output volumes.
    default: genai

# ---------------------------------------------------------------------------
# Resources = the things Databricks creates. Here: one Lakeflow Job with a
# single Python task that calls the inside-Databricks LLM and writes a file
# into the Unity Catalog volume we created (workspace.genai.output).
# ---------------------------------------------------------------------------
resources:
  jobs:
    mvp0_weekly_report:
      name: "[${bundle.target}] document-insights skill"

      tasks:
        - task_key: run_skill
          spark_python_task:
            python_file: ./src/run_skill.py
            # Task parameters arrive as argv; this is how the DAB variable
            # above reaches the running code (see argparse in the script).
            # The job reads --in-path from the INPUT volume and writes to the
            # OUTPUT (--out-dir): the "input bucket -> output bucket" model.
            parameters:
              - "--model"
              - "${var.llm_endpoint}"
              - "--in-path"
              - "/Volumes/${var.catalog}/${var.schema}/input/weekly-update.md"
              - "--out-dir"
              - "/Volumes/${var.catalog}/${var.schema}/output"
              - "--rejected-dir"
              - "/Volumes/${var.catalog}/${var.schema}/rejected"
              # DECOUPLED: the skill is consumed from a shared UC VOLUME (published once via
              # scripts/publish_skill.py), NOT bundled with this job. Update the skill in one
              # place and every consumer picks it up - no per-job redeploy. See
              # docs/skill-reuse-on-databricks.md.
              - "--skill-dir"
              - "/Volumes/${var.catalog}/${var.schema}/skills/document-insights"
              - "--log-level"
              - "INFO"          # set to DEBUG to see every step in the run logs
          # Free Edition runs on SERVERLESS compute. An "environment" is the
          # serverless equivalent of a cluster's installed libraries.
          environment_key: serverless_env

      environments:
        - environment_key: serverless_env
          spec:
            environment_version: "3"   # serverless env version (was the deprecated `client` field)
            dependencies:
              - requests
            # Enterprise / air-gapped note: in locked-down workspaces there is no
            # open PyPI. Point dependency resolution at your internal Artifactory/Nexus
            # by setting PIP_INDEX_URL / PIP_EXTRA_INDEX_URL / PIP_TRUSTED_HOST as
            # environment variables on the compute (confirm the mechanism with your
            # platform team; a workspace-level private PyPI mirror is the alternative).
            # See .env.example for the variable names.

      # Weekly timer (your requirement) - PAUSED so the pilot never fires on
      # its own. We trigger it by hand until we're happy, then unpause.
      schedule:
        quartz_cron_expression: "0 0 13 ? * MON"   # Mondays 13:00
        timezone_id: UTC
        pause_status: PAUSED

      max_concurrent_runs: 1

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-6d24dae0-8d3d.cloud.databricks.com

  ## Optionally, there could be 'staging' or 'prod' targets here.
  #
  # prod:
  #   workspace:
  #     host: https://dbc-6d24dae0-8d3d.cloud.databricks.com
