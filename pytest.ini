[pytest]
# A bare `pytest` collects only tests/. The live suites are scripts/e2e_*.py - standalone
# scripts with main() and exit codes, run by scripts/smoke.py against the DEPLOYED system.
# (Nothing stops someone pointing pytest at scripts/ explicitly; nothing does.)
testpaths = tests

markers =
    integration: needs a live Databricks workspace (deselect with -m "not integration")

# Load-bearing. Without it a typo'd marker (@pytest.mark.integraton) is only a warning, and
# `-m "not integration"` then INCLUDES that test - so the workspace-dependent test runs in CI
# anyway, which is the exact failure this convention exists to prevent. With it, the typo is a
# collection error. Verified on pytest 9: use this ini option, not --strict-markers via
# addopts, which is silently ignored there.
strict_markers = true
